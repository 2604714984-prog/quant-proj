name: ci

on:
  push:
    branches: [v2-main]
  pull_request:
    branches: [v2-main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade 'pip==26.1.2'
      - run: python -m pip wheel --no-deps . --wheel-dir dist
      - run: sha256sum dist/*.whl | tee dist/SHA256SUMS
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: quant-system-wheel-${{ github.sha }}
          path: |
            dist/*.whl
            dist/SHA256SUMS
          if-no-files-found: error
          retention-days: 30
      - run: python -m pip install 'pytest==9.1.1' 'ruff==0.15.21' dist/*.whl
      - run: python -m pip check
      - run: cd "$RUNNER_TEMP" && quant info
      - run: python -m ruff check .
      - run: python -m pytest -q -o pythonpath=
