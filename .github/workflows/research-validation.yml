name: research-validation

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  static-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install validation dependencies
        run: python -m pip install pyyaml
      - name: Compile tracked Python files
        run: |
          files="$(git ls-files '*.py')"
          if [ -n "$files" ]; then
            python -m py_compile $files
          fi
      - name: Parse tracked JSON files
        run: |
          git ls-files '*.json' \
            ':!:data/**' ':!:outputs/**' ':!:reports/runops/**' \
            | while read -r file; do python -m json.tool "$file" >/dev/null; done
      - name: Validate current projects registry schema
        run: python scripts/validate_projects_registry.py
