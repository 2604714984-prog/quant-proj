    name: "Quant-Dispatcher"
    role: "task intake, triage, dependency ordering, and assignment"
    primary_tool: "Codex CLI or Codex desktop thread rooted at quant proj"
    allowed_write_scope:
      - "tasks/"
      - "reports/workspace_dispatch/"
      - "registry/"
      - "prompts/"
      - "runbooks/"
    forbidden_write_scope:
      - "/Users/rongyuxu/Desktop/A_Share_Monitor"
      - "/Users/rongyuxu/Desktop/US_Stock_Monitor"
